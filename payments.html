<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mes Paiements — Atelier GSH</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <a href="index.html" class="navbar-brand">
      <div class="navbar-logo">🎓</div>
      <span class="navbar-title">Atelier GSH</span>
    </a>
    <div class="navbar-nav">
      <a href="dashboard.html" class="nav-link">Mon espace</a>
      <a href="activities.html" class="nav-link">Activités</a>
      <a href="payments.html" class="nav-link active">Paiements</a>
      <button class="btn btn-outline btn-sm" onclick="logout()">Déconnexion</button>
    </div>
  </nav>

  <!-- Header -->
  <div style="background:white;border-bottom:1px solid var(--border);padding:32px 24px">
    <div class="container">
      <h1 style="font-size:24px;font-weight:700;margin-bottom:8px">Mes paiements 💳</h1>
      <p style="color:var(--text-secondary)">Historique de tous vos paiements</p>
    </div>
  </div>

  <div class="container section">

    <!-- Stats -->
    <div class="stats-grid" style="margin-bottom:32px">
      <div class="stat-card">
        <div class="stat-icon" style="background:#D1FAE5">✅</div>
        <div class="stat-value" id="stat-paid" style="color:var(--success)">-</div>
        <div class="stat-label">Total payé</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon" style="background:#FEF3C7">⏳</div>
        <div class="stat-value" id="stat-pending" style="color:var(--warning)">-</div>
        <div class="stat-label">En attente</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon" style="background:#EFF6FF">📊</div>
        <div class="stat-value" id="stat-total" style="color:var(--primary)">-</div>
        <div class="stat-label">Total paiements</div>
      </div>
    </div>

    <!-- Payments table -->
    <div class="table-container">
      <div class="table-header">
        <h2 style="font-size:16px;font-weight:600">Historique des paiements</h2>
        <div style="display:flex;gap:8px">
          <select id="filter-status" class="form-control" style="width:auto" onchange="filterPayments()">
            <option value="">Tous les statuts</option>
            <option value="paid">Payés</option>
            <option value="pending">En attente</option>
            <option value="partial">Partiel</option>
          </select>
        </div>
      </div>
      <div id="payments-container">
        <div class="loading">⏳ Chargement...</div>
      </div>
    </div>

  </div>

  <!-- Footer -->
  <footer class="footer">
    <p>© 2026 Atelier GSH — Tous droits réservés</p>
  </footer>

  <script src="js/api.js"></script>
  <script>
    requireAuth();

    let allPayments = [];

    async function loadPayments() {
      const result = await apiCall('/parent/payments');
      const container = document.getElementById('payments-container');

      if (!result.ok) {
        container.innerHTML = '<p style="padding:24px">Erreur de chargement.</p>';
        return;
      }

      allPayments = result.data;

      // Stats
      const totalPaid = allPayments
        .filter(p => p.status === 'paid')
        .reduce((sum, p) => sum + parseFloat(p.amount), 0);
      const totalPending = allPayments
        .filter(p => p.status === 'pending')
        .reduce((sum, p) => sum + parseFloat(p.amount), 0);

      document.getElementById('stat-paid').textContent = formatAmount(totalPaid);
      document.getElementById('stat-pending').textContent = formatAmount(totalPending);
      document.getElementById('stat-total').textContent = allPayments.length;

      renderPayments(allPayments);
    }

    function filterPayments() {
      const status = document.getElementById('filter-status').value;
      const filtered = status
        ? allPayments.filter(p => p.status === status)
        : allPayments;
      renderPayments(filtered);
    }

    function renderPayments(payments) {
      const container = document.getElementById('payments-container');

      if (payments.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">💳</div>
            <h3>Aucun paiement trouvé</h3>
            <p>Vos paiements apparaîtront ici</p>
          </div>`;
        return;
      }

      container.innerHTML = `
        <table class="table">
          <thead>
            <tr>
              <th>Enfant</th>
              <th>Activité</th>
              <th>Date</th>
              <th>Méthode</th>
              <th>Montant</th>
              <th>Statut</th>
            </tr>
          </thead>
          <tbody>
            ${payments.map(p => `
              <tr>
                <td>
                  <strong>
                    ${p.registration?.student?.first_name || ''}
                    ${p.registration?.student?.last_name || ''}
                  </strong>
                </td>
                <td>${p.registration?.activity?.title || 'N/A'}</td>
                <td>${formatDate(p.payment_date)}</td>
                <td>${formatMethod(p.payment_method)}</td>
                <td style="color:var(--success);font-weight:700">
                  ${formatAmount(p.amount)}
                </td>
                <td>${statusBadge(p.status)}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>`;
    }

    function formatMethod(method) {
      const methods = {
        'especes': '💵 Espèces',
        'virement': '🏦 Virement',
        'cheque': '📄 Chèque',
        'carte': '💳 Carte',
      };
      return methods[method] || method;
    }

    loadPayments();
  </script>
</body>
</html>
